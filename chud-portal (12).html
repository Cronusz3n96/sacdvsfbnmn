<title>chud portal</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#111;--topbar:#161616;--card:#1e1e1e;--card-hover:#252525;--border:#2a2a2a;--text:#fff;--text-sub:#777;--radius:10px;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;}
#bg-img{position:fixed;inset:0;width:120%;height:120%;object-fit:fill;z-index:0;pointer-events:none;transform:scale(1.2);transform-origin:center center;}
#made-by{position:fixed;top:0;left:0;right:0;z-index:101;width:100%;text-align:center;padding:6px;font-size:11px;color:rgba(255,255,255,0.3);background:rgba(0,0,0,0.25);border-bottom:1px solid rgba(255,255,255,0.05);letter-spacing:0.05em;}
#topbar{position:fixed;top:29px;left:0;right:0;height:52px;background:rgba(0,0,0,0.25);backdrop-filter:blur(4px);border-bottom:1px solid rgba(255,255,255,0.05);display:flex;align-items:center;padding:0 20px;gap:12px;z-index:100;}
#brand{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0;}
#brand-icon{width:34px;height:34px;background:#fff;border-radius:8px;display:flex;align-items:center;justify-content:center;}
#brand-icon svg{width:18px;height:18px;color:#111;}
#brand-name{font-size:15px;font-weight:600;color:#fff;white-space:nowrap;}
#search-wrap{margin-left:auto;position:relative;width:280px;}
#search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text-sub);width:14px;height:14px;pointer-events:none;}
#search{width:100%;height:36px;background:#2a2a2a;border:1px solid transparent;border-radius:8px;color:#fff;font-family:'Inter',sans-serif;font-size:13px;padding:0 12px 0 34px;outline:none;transition:border-color .15s,background .15s;}
#search::placeholder{color:var(--text-sub)}
#search:focus{border-color:#444;background:#333;}
#main{padding:97px 20px 48px;position:relative;z-index:1;}
#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;}
.card{background:var(--card);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:background .12s,transform .12s;position:relative;}
.card:hover{background:var(--card-hover);transform:translateY(-2px);}
.card-thumb{width:100%;aspect-ratio:16/9;background:#1a1a1a;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;}
.card-thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;opacity:0;transition:opacity .25s;}
.card-thumb img.loaded{opacity:1;}
.card-thumb .ini{font-size:26px;font-weight:700;color:#333;text-transform:uppercase;user-select:none;letter-spacing:.02em;transition:opacity .25s;z-index:1;position:relative;}
.card-thumb img.loaded ~ .ini{opacity:0;}
.card-label{padding:8px 10px 10px;font-size:12px;font-weight:500;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
/* screenshot badge */
.snap-badge{
  position:absolute;top:5px;right:5px;
  background:rgba(0,0,0,0.7);
  border-radius:4px;padding:2px 5px;
  font-size:9px;color:#4caf50;
  opacity:0;transition:opacity .2s;
  pointer-events:none;z-index:10;
  font-family:'Inter',sans-serif;
}
.card:hover .snap-badge{opacity:1;}
.snap-badge.has-snap{color:#4caf50;}
.snap-badge.no-snap{color:#666;}
#empty{display:none;padding:80px 20px;color:var(--text-sub);font-size:13px;text-align:center;}
/* toast */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:#1e1e1e;border:1px solid #333;color:#fff;font-size:12px;padding:8px 16px;border-radius:8px;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;z-index:999;font-family:'Inter',sans-serif;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:3px}
</style>

// ── Snapshot storage ──────────────────────────────────────────────────────────
function snapKey(file){ return SNAP_PREFIX + file.toLowerCase(); }
function getSnap(file){ try{ return localStorage.getItem(snapKey(file)); }catch(e){ return null; } }
function saveSnap(file, dataUrl){ try{ localStorage.setItem(snapKey(file), dataUrl); }catch(e){} }

// ── Toast ─────────────────────────────────────────────────────────────────────
let toastTimer;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),2500);
}

// ── Listen for screenshots from game windows ──────────────────────────────────
window.addEventListener('message', e => {
  if(e.data && e.data.type==='chud_snap'){
    const {file, dataUrl} = e.data;
    saveSnap(file, dataUrl);
    // update any visible card
    const card = document.querySelector(`.card[data-file="${CSS.escape(file)}"]`);
    if(card){
      const thumb = card.querySelector('.card-thumb');
      let img = thumb.querySelector('img');
      if(!img){
        img = document.createElement('img');
        img.alt = file;
        thumb.insertBefore(img, thumb.firstChild);
      }
      img.src = dataUrl;
      img.onload = ()=>{ img.classList.add('loaded'); };
      const badge = card.querySelector('.snap-badge');
      if(badge){ badge.textContent='📸 captured'; badge.className='snap-badge has-snap'; }
    }
    toast('📸 Thumbnail saved for ' + displayName(file));
  }
});

// ── Screenshot injection script ───────────────────────────────────────────────
// This gets injected into every game's HTML before it's written to the new window
function makeSnapScript(fileKey, parentOrigin){
  return `<script>
(function(){
  var _sent = false;

function launchGame(file){
  const norm = file.endsWith('.html') ? file : file + '.html';
  const origin = location.origin || (location.protocol+'//'+location.host);
  fetch(`${CDN}${encodeURIComponent(norm)}?t=${Date.now()}`)
    .then(r => r.text())
    .then(html => {
      // Inject snap script just before </body> or at end
      const snapScript = makeSnapScript(file, origin);
      const injected = html.includes('</body>')
        ? html.replace('</body>', snapScript + '</body>')
        : html + snapScript;
      const w = window.open('about:blank','_blank');
      if(w){ w.document.open(); w.document.write(injected); w.document.close(); }
    })
    .catch(()=> window.open(`${CDN}${encodeURIComponent(norm)}`,'_blank'));
}

function displayName(f){return f.replace(/^cl/i,'').trim()||f;}
function initials(n){const w=n.replace(/[^a-zA-Z0-9\s]/g,' ').trim().split(/\s+/);return(w.length>=2?(w[0][0]+(w[1][0]||'')):n.substring(0,2)).toUpperCase();}

function getStaticImg(file){
  const key=displayName(file).toLowerCase().replace(/[^a-z0-9]/g,'');
  if(IMGS[key]) return IMGS[key];
  let best=null,bestLen=0;
  for(const k of Object.keys(IMGS)){
    if(key.startsWith(k)&&k.length>bestLen){best=IMGS[k];bestLen=k.length;}
    if(k.startsWith(key)&&key.length>=5&&key.length>bestLen){best=IMGS[k];bestLen=key.length;}
  }
  return best;
}

function getBestImg(file){
  // Saved screenshot takes priority
  const snap = getSnap(file);
  if(snap) return {url:snap, isSnap:true};
  const staticUrl = getStaticImg(file);
  if(staticUrl) return {url:staticUrl, isSnap:false};
  return null;
}

const games=[...new Map(RAW.map(f=>[f.toLowerCase(),f])).values()]
  .sort((a,b)=>displayName(a).localeCompare(displayName(b),undefined,{sensitivity:'base'}));

const grid=document.getElementById('grid');
const emptyEl=document.getElementById('empty');
const searchInput=document.getElementById('search');

function makeCard(file){
  const name=displayName(file);
  const card=document.createElement('div');
  card.className='card';
  card.dataset.file=file;

  const thumb=document.createElement('div');
  thumb.className='card-thumb';

  const ini=document.createElement('span');
  ini.className='ini';
  ini.textContent=initials(name);

  const imgData=getBestImg(file);
  if(imgData){
    const img=document.createElement('img');
    img.loading='lazy';
    img.decoding='async';
    img.src=imgData.url;
    img.alt=name;
    img.onload=()=>img.classList.add('loaded');
    img.onerror=()=>img.remove();
    thumb.appendChild(img);
  }
  thumb.appendChild(ini);

  // snap badge
  const badge=document.createElement('div');
  badge.className='snap-badge ' + (getSnap(file)?'has-snap':'no-snap');
  badge.textContent=getSnap(file)?'📸 captured':'📸 play to capture';
  card.appendChild(thumb);

  const label=document.createElement('div');
  label.className='card-label';
  label.textContent=name;

  card.appendChild(badge);
  card.appendChild(label);
  card.onclick=()=>launchGame(file);
  return card;
}

function render(list){
  grid.innerHTML='';
  emptyEl.style.display=list.length?'none':'block';
  if(!list.length)return;
  let i=0;
  function chunk(){
    const end=Math.min(i+60,list.length);
    const frag=document.createDocumentFragment();
    for(;i<end;i++)frag.appendChild(makeCard(list[i]));
    grid.appendChild(frag);
    if(i<list.length)requestAnimationFrame(chunk);
  }
  chunk();
}

render(games);

let t;
searchInput.addEventListener('input',()=>{
  clearTimeout(t);
  t=setTimeout(()=>{
    const q=searchInput.value.trim().toLowerCase();
    render(q?games.filter(f=>displayName(f).toLowerCase().includes(q)):games);
  },150);
});
document.addEventListener('keydown',e=>{
  if(e.key==='/'&&document.activeElement!==searchInput){e.preventDefault();searchInput.focus();}
  if(e.key==='Escape')searchInput.blur();
});
